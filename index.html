<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルコールチェック管理画面</title>
    <style>
        /* スカイブルー調の爽やかで清潔感のあるデスクトップデザイン */
        :root {
            --primary-color: #0ea5e9;       /* メインのスカイブルー */
            --primary-hover: #0284c7;       /* ホバー時の濃い青 */
            --bg-color: #f0f9ff;            /* 背景の薄い青 */
            --text-color: #334155;          /* 基本文字色 */
            
            --border-color: #bae6fd;        /* 枠線 */
            --white: #ffffff;
            --safe-color: #10b981;          /* 安全（緑） */
            --danger-color: #ef4444;        /* 警告（赤） */
            --warn-color: #f59e0b;          /* 注意（黄） */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 20px;
        }

        .dashboard-container {
            background-color: var(--white);
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 {
            color: var(--primary-hover);
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* コントロールエリア（検索・ボタン） */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        /* 【追加】月選択プルダウンのスタイル */
        .search-box select {
            padding: 10px 14px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            background-color: var(--white);
            cursor: pointer;
            min-width: 150px;
            transition: border-color 0.2s;
        }
        .search-box select:focus {
            border-color: var(--primary-color);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .selection-status {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: bold;
        }

        /* ボタン共通スタイル */
        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: white;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-time {
            background-color: #64748b; /* 落ち着いたグレー */
        }

        .btn-time:hover {
            background-color: #475569;
        }

        .btn-print {
            background-color: var(--primary-color);
        }

        .btn-print:hover {
            background-color: var(--primary-hover);
        }

        .btn-pdf {
            background-color: #0d9488; /* ティール色 */
        }

        .btn-pdf:hover {
            background-color: #0f766e;
        }

        /* 削除ボタンのスタイル */
        .btn-delete {
            background-color: var(--danger-color);
        }

        .btn-delete:hover {
            background-color: #b91c1c;
        }

        /* テーブルスタイル */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 1200px; /* 横スクロールを確保するための最低幅 */
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #e0f2fe;
            color: #0369a1;
            font-weight: bold;
            position: relative;
            user-select: none;
        }

        /* 並び替え可能なヘッダー */
        th.sortable {
            cursor: pointer;
        }

        th.sortable:hover {
            background-color: #bae6fd;
        }

        th.sortable::after {
            content: " ↕";
            font-size: 0.75rem;
            color: #0284c7;
            margin-left: 5px;
            opacity: 0.6;
        }

        th.sort-asc::after {
            content: " ▲" !important;
            opacity: 1;
        }

        th.sort-desc::after {
            content: " ▼" !important;
            opacity: 1;
        }

        tr {
            transition: background-color 0.1s;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* 選択された行のスタイル */
        tr.selected-row {
            background-color: #e0f2fe !important;
        }

        /* 印刷済み行のスタイル */
        tr.printed-row {
            background-color: #f1f5f9 !important; /* 目立たない薄いグレーに変更 */
        }
        /* 印刷済みの場合、氏名の前にマークを表示 */
        tr.printed-row td:nth-child(2)::before {
            content: "【印刷済】 ";
            color: #64748b;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* チェックボックスのサイズ調整 */
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* ステータスバッジ */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
        }

        .badge-safe { background-color: #dcfce7; color: #16a34a; }
        .badge-danger { background-color: #fee2e2; color: #dc2626; }
        .badge-warn { background-color: #fef3c7; color: #d97706; }

        /* 項目別の幅・配置調整 */
        .col-check { width: 40px; text-align: center; }
        .col-center { text-align: center; }

        /* ⑫ 備考欄の省略対策 */
        .col-remarks {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .col-remarks:hover {
            white-space: normal;
            word-break: break-all;
        }

        /* ==========================================
            印刷・PDF化用のクエリ (@media print)
           ========================================== */
        @media print {
            body {
                background-color: #ffffff;
                padding: 0;
                color: #000000;
            }

            .dashboard-container {
                box-shadow: none;
                padding: 0;
                max-width: 100%;
            }

            /* 印刷時に不要なコントローラーやチェックボックスを非表示 */
            header, .control-panel, .col-check, input[type="checkbox"] {
                display: none !important;
            }

            .table-wrapper {
                border: none;
                overflow: visible;
            }

            table {
                width: 100%;
                min-width: 100%;
                font-size: 0.75rem; /* A4横に収まりやすくするため文字を縮小 */
            }

            th, td {
                padding: 6px 8px;
                border: 1px solid #cbd5e1 !important; /* しっかり枠線を出す */
            }

            th {
                background-color: #f1f5f9 !important;
                color: #000000 !important;
            }

            th.sortable::after {
                display: none; /* ソートアイコンを非表示 */
            }

            tr {
                background-color: #ffffff !important;
                page-break-inside: avoid;
            }

            /* 実際の印刷時には「印刷済」の背景色やテキストを写さない設定 */
            tr.printed-row {
                background-color: #ffffff !important;
            }
            tr.printed-row td:nth-child(2)::before {
                display: none !important;
            }

            .badge {
                padding: 0;
                background-color: transparent !important;
                color: #000000 !important;
                font-weight: bold;
            }
            
            /* 備考欄の全表示 */
            .col-remarks {
                max-width: none;
                white-space: normal;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1>📋 アルコールチェック運行管理データ一覧</h1>
    </header>

    <div class="control-panel">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="運転者、車両Noで検索...">
            <select id="monthSelect" onchange="filterTable()">
                <option value="all">すべての月</option>
            </select>
        </div>

        <div class="action-buttons">
            <span class="selection-status">選択中: <span id="selectedCount">0</span> 件</span>
            <button class="btn btn-time" onclick="resetToInitialOrder()">🕒 時間順に戻す</button>
            <button class="btn btn-print" onclick="triggerPrint()">🖨️ 画面印刷</button>
            <button class="btn btn-pdf" onclick="triggerPrint()">📄 PDFとして保存</button>
            <button class="btn btn-delete" onclick="deleteSelectedRows()">🗑️ 選択削除</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr>
                    <th class="col-check"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
                    <th class="sortable" id="th-name" onclick="sortTable('name')">① 運転者氏名</th>
                    <th class="sortable" id="th-car" onclick="sortTable('car')">② 車両ナンバー</th>
                    <th>③ 測定日</th>
                    <th>④ 測定時間</th>
                    <th>⑤ 状況</th>
                    <th>⑥ 測定結果</th>
                    <th class="col-center">⑦ 酒気帯び</th>
                    <th class="col-center">⑧ 健康</th>
                    <th class="col-center">⑨ 点検</th>
                    <th>⑩ 確認方法・詳細</th>
                    <th>⑪ 走行距離</th>
                    <th>⑫ 備考欄</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRgvEH3pS22xlOhK01uCnoMg9s9_qkcyUMcJ8fww1QiFfAhRnGMBy41F8db-SR9C2zQTAD_Y_e5W5wN/pub?output=csv";

    window.onload = function() {
        loadSheetData();
    };

    // 1. 【大幅変更】検索 ＆ 月選択の複合フィルター機能
    function filterTable() {
        const input = document.getElementById("searchInput");
        const filter = input.value.toLowerCase();
        const monthSelect = document.getElementById("monthSelect").value;
        const table = document.getElementById("dataTable");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            const tdName = tr[i].cells[1];
            const tdCar  = tr[i].cells[2];
            const tdDate = tr[i].cells[3]; // ③ 測定日
            
            if (tdName && tdCar && tdDate) {
                const nameText = tdName.textContent.toLowerCase();
                const carText  = tdCar.textContent.toLowerCase();
                const dateText = tdDate.textContent.trim();
                
                // 月フィルタの判定
                let matchesMonth = true;
                if (monthSelect !== "all") {
                    // 日付の形式 (YYYY/MM/DD や YYYY-MM-DD) から 年/月 を統一して抽出して比較
                    const normalizedDate = dateText.replace(/-/g, '/');
                    const match = normalizedDate.match(/^(\d{4})\/(\d{1,2})/);
                    if (match) {
                        const y = match[1];
                        const m = match[2].padStart(2, '0');
                        const rowMonth = `${y}/${m}`;
                        matchesMonth = (rowMonth === monthSelect);
                    } else {
                        matchesMonth = false;
                    }
                }
                
                // キーワード検索の判定
                const matchesSearch = nameText.includes(filter) || carText.includes(filter);
                
                // 両方の条件に一致する場合のみ表示
                if (matchesMonth && matchesSearch) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                    // 非表示になった行のチェックボックスは外す
                    const cb = tr[i].querySelector(".row-check");
                    if (cb) cb.checked = false;
                }
            }
        }
        // 全選択チェックボックスをクリアし、カウントを更新
        document.getElementById("selectAll").checked = false;
        updateSelectedCount();
    }

    // ==========================================================
    // 👥 メンバーの名前とよみがなの対応表
    // ==========================================================
    const USER_KANA_MAP = {
        "所": "ところ",
        "大和田": "おおわだ",
        "木村": "きむら",
        "棚澤": "たなざわ",
        "森(太)": "もり",
        "加藤": "かとう",
        "上野": "うえの",
        "高橋": "たかはし",
    };

    // 2. 並び替え（ソート）機能
    let currentSort = { column: null, direction: 'asc' };

    function sortTable(type) {
        const table = document.getElementById("dataTable");
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));
        
        const colIndex = (type === 'name') ? 1 : 2;
        
        if (currentSort.column === type) {
            currentSort.direction = (currentSort.direction === 'asc') ? 'desc' : 'asc';
        } else {
            currentSort.column = type;
            currentSort.direction = 'asc';
        }

        updateSortHeaders(type, currentSort.direction);

        const directionModifier = (currentSort.direction === 'asc') ? 1 : -1;

        rows.sort((rowA, rowB) => {
            if (type === 'name') {
                const nameA = rowA.cells[colIndex].textContent.replace("【印刷済】 ", "").trim();
                const nameB = rowB.cells[colIndex].textContent.replace("【印刷済】 ", "").trim();
                
                const valA = USER_KANA_MAP[nameA] || nameA;
                const valB = USER_KANA_MAP[nameB] || nameB;

                return valA.localeCompare(valB, 'ja') * directionModifier;
            } else {
                const textA = rowA.cells[colIndex].textContent.trim();
                const textB = rowB.cells[colIndex].textContent.trim();
                
                const numA = parseInt(textA, 10) || 0;
                const numB = parseInt(textB, 10) || 0;
                
                return (numA - numB) * directionModifier;
            }
        });

        rows.forEach(row => tbody.appendChild(row));
    }

    function updateSortHeaders(activeType, direction) {
        const thName = document.getElementById("th-name");
        const thCar = document.getElementById("th-car");

        thName.className = "sortable";
        thCar.className = "sortable";

        if (activeType === 'name') {
            thName.classList.add(direction === 'asc' ? 'sort-asc' : 'sort-desc');
        } else if (activeType === 'car') {
            thCar.classList.add(direction === 'asc' ? 'sort-asc' : 'sort-desc');
        }
    }

    // 3. 選択機能
    function toggleSelectAll(masterCheckbox) {
        const checkboxes = document.querySelectorAll(".row-check");
        checkboxes.forEach(cb => {
            const row = cb.closest("tr");
            if (row.style.display !== "none") {
                cb.checked = masterCheckbox.checked;
                updateRowStyle(cb);
            }
        });
        updateSelectedCount();
    }

    function updateRowStyle(checkbox) {
        const row = checkbox.closest("tr");
        if (checkbox.checked) {
            row.classList.add("selected-row");
        } else {
            row.classList.remove("selected-row");
        }
    }

    function updateSelectedCount() {
        const checkedCount = document.querySelectorAll(".row-check:checked").length;
        document.getElementById("selectedCount").textContent = checkedCount;
    }

    // 4. 【修正】印刷 & PDF化機能（絞り込んだ月のデータだけを対象にするよう強化）
    function triggerPrint() {
        const checkboxes = document.querySelectorAll(".row-check");
        const checkedCount = document.querySelectorAll(".row-check:checked").length;
        const allRows = document.querySelectorAll("#dataTable tbody tr");
        
        // 元の画面表示状態を記憶する一時配列
        const originalDisplays = [];

        // チェックが1件以上入っている場合
        if (checkedCount > 0) {
            checkboxes.forEach((cb) => {
                const row = cb.closest("tr");
                originalDisplays.push({ row: row, display: row.style.display });
                
                if (!cb.checked) {
                    row.style.display = "none"; // チェックのないものは非表示（印刷しない）
                } else {
                    row.classList.add("printed-row");
                }
            });
        } else {
            // チェックがない場合は「現在画面に表示されている行（選択中の月のデータ）」のみを印刷対象にする
            allRows.forEach((row) => {
                originalDisplays.push({ row: row, display: row.style.display });
                if (row.style.display === "none") {
                    // すでに非表示（他月など）のものはそのまま非表示
                } else {
                    row.classList.add("printed-row"); // 表示中（当月）のものに印刷済マーク
                }
            });
        }

        // 印刷（またはPDF保存）ダイアログを起動
        window.print();

        // 印刷ダイアログが閉じたら、元の画面表示状態に即座に復元する
        originalDisplays.forEach(item => {
            item.row.style.display = item.display;
        });
    }

    // 5. 選択した行を画面から削除（非表示）にする機能
    function deleteSelectedRows() {
        const checkboxes = document.querySelectorAll(".row-check:checked");
        if (checkboxes.length === 0) {
            alert("削除する行が選択されていません。");
            return;
        }

        if (confirm(`選択された ${checkboxes.length} 件のデータを画面から非表示にしますか？\n（※元のGoogleスプレッドシートのデータは削除されません。再読み込みすると元に戻ります）`)) {
            checkboxes.forEach(cb => {
                const row = cb.closest("tr");
                row.remove(); // 画面のDOMから削除
            });
            document.getElementById("selectAll").checked = false;
            updateSelectedCount();
            // データ数が変わったため月プルダウンを再更新
            updateMonthOptions();
        }
    }

    // 6. スプレッドシートからデータを取得
    function loadSheetData() {
        const cacheBuster = SPREADSHEET_CSV_URL + "&t=" + new Date().getTime();

        fetch(cacheBuster)
            .then(response => response.text())
            .then(csvText => {
                const tbody = document.querySelector("#dataTable tbody");
                tbody.innerHTML = "";

                const lines = csvText.split("\n");
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue; 

                    const cells = line.replace(/\r$/, "").split(",");
                    
                    const name       = cells[0]  || "";
                    const kana       = cells[1]  || "";
                    const car        = cells[2]  || "";
                    const date       = cells[3]  || "";
                    const time       = cells[4]  || "";
                    const status     = cells[5]  || "";
                    const result     = cells[6]  || "";
                    const alcohol    = cells[7]  || "";
                    const health     = cells[8]  || "";
                    const inspection = cells[9]  || "";
                    const method     = cells[10] || "";
                    const distance   = cells[11] || "";
                    const remarks    = cells[12] || "";

                    let badgeClass = "badge-safe";
                    if (alcohol.includes("有り")) badgeClass = "badge-danger";
                    if (alcohol.includes("注意")) badgeClass = "badge-warn";

                    const tr = document.createElement("tr");
                    tr.setAttribute("data-index", i);
                    
                    tr.innerHTML = `
                        <td class="col-check"><input type="checkbox" class="row-check" onchange="updateRowStyle(this); updateSelectedCount();"></td>
                        <td>${name}</td>
                        <td>${car}</td>
                        <td>${date}</td>
                        <td>${time}</td>
                        <td>${status}</td>
                        <td>${result}</td>
                        <td class="col-center"><span class="badge ${badgeClass}">${alcohol}</span></td>
                        <td class="col-center">${health}</td>
                        <td class="col-center">${inspection}</td>
                        <td>${method}</td>
                        <td>${distance}</td>
                        <td class="col-remarks">${remarks}</td>
                    `;
                    tbody.appendChild(tr);
                }

                // 【追加】データ読み込み成功後に、月選択肢を自動生成する
                updateMonthOptions();
            })
            .catch(error => {
                console.error("データの読み込みに失敗しました:", error);
            });
    }

    // 【新規追加】7. データ内の日付から一意な「月」を抽出してプルダウンを生成する関数
    function updateMonthOptions() {
        const table = document.getElementById("dataTable");
        const rows = table.querySelectorAll("tbody tr");
        const months = new Set();

        rows.forEach(row => {
            const dateText = row.cells[3].textContent.trim(); // ③ 測定日
            // 日付表記 (YYYY/MM/DD や YYYY-MM-DD) から「年」と「月」を取り出す
            const normalizedDate = dateText.replace(/-/g, '/');
            const match = normalizedDate.match(/^(\d{4})\/(\d{1,2})/);
            if (match) {
                const year = match[1];
                const month = match[2].padStart(2, '0'); // 1桁の月を2桁に揃える (例: 6 -> 06)
                months.add(`${year}/${month}`);
            }
        });

        const monthSelect = document.getElementById("monthSelect");
        // 初期化（「すべての月」だけ残す）
        monthSelect.innerHTML = '<option value="all">すべての月</option>';

        // 降順（新しい月が上）に並び替えてプルダウンに追加
        Array.from(months).sort().reverse().forEach(m => {
            const option = document.createElement("option");
            option.value = m; // フィルター用値 (例: "2026/06")
            
            const [y, mm] = m.split('/');
            option.textContent = `${y}年${mm}月`; // 表示用テキスト
            monthSelect.appendChild(option);
        });
    }

    // 8. 初期順（時間順）に戻す機能
    function resetToInitialOrder() {
        const table = document.getElementById("dataTable");
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));

        rows.sort((rowA, rowB) => {
            const indexA = parseInt(rowA.getAttribute("data-index"), 10);
            const indexB = parseInt(rowB.getAttribute("data-index"), 10);
            return indexA - indexB;
        });

        rows.forEach(row => tbody.appendChild(row));

        currentSort = { column: null, direction: 'asc' };
        updateSortHeaders(null, null);
    }
</script>
