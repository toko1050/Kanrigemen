<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Untitled</title>
    

  </head>
    
  <body>
  <html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルコールチェック管理画面</title>
    <style>
        /* スカイブルー調の爽やかで清潔感のあるデスクトップデザイン */
        :root {
            --primary-color: #0ea5e9;       /* メインのスカイブルー */
            --primary-hover: #0284c7;       /* ホバー時の濃い青 */
            --bg-color: #f0f9ff;            /* 背景の薄い青 */
            --text-color: #334155;          /* 基本文字色 */
            
            --border-color: #bae6fd;        /* 枠線 */
            --white: #ffffff;
            --safe-color: #10b981;          /* 安全（緑） */
            --danger-color: #ef4444;        /* 警告（赤） */
            --warn-color: #f59e0b;          /* 注意（黄） */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 20px;
        }

        .dashboard-container {
            background-color: var(--white);
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 {
            color: var(--primary-hover);
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* コントロールエリア（検索・ボタン） */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .selection-status {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: bold;
        }

        /* ボタン共通スタイル */
        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: white;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-print {
            background-color: var(--primary-color);
        }

        .btn-print:hover {
            background-color: var(--primary-hover);
        }

        .btn-pdf {
            background-color: #0d9488; /* ティール色 */
        }

        .btn-pdf:hover {
            background-color: #0f766e;
        }

        /* テーブルスタイル */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 1200px; /* 横スクロールを確保するための最低幅 */
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #e0f2fe;
            color: #0369a1;
            font-weight: bold;
            position: relative;
            user-select: none;
        }

        /* 並び替え可能なヘッダー */
        th.sortable {
            cursor: pointer;
        }

        th.sortable:hover {
            background-color: #bae6fd;
        }

        th.sortable::after {
            content: " ↕";
            font-size: 0.75rem;
            color: #0284c7;
            margin-left: 5px;
            opacity: 0.6;
        }

        th.sort-asc::after {
            content: " ▲" !important;
            opacity: 1;
        }

        th.sort-desc::after {
            content: " ▼" !important;
            opacity: 1;
        }

        tr {
            transition: background-color 0.1s;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* 選択された行のスタイル */
        tr.selected-row {
            background-color: #e0f2fe !important;
        }

        /* チェックボックスのサイズ調整 */
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* ステータスバッジ */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
        }

        .badge-safe { background-color: #dcfce7; color: #16a34a; }
        .badge-danger { background-color: #fee2e2; color: #dc2626; }
        .badge-warn { background-color: #fef3c7; color: #d97706; }

        /* 項目別の幅・配置調整 */
        .col-check { width: 40px; text-align: center; }
        .col-center { text-align: center; }

        /* ⑫ 備考欄の省略対策 */
        .col-remarks {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .col-remarks:hover {
            white-space: normal;
            word-break: break-all;
        }

        /* ==========================================
           印刷・PDF化用のクエリ (@media print)
           ========================================== */
        @media print {
            body {
                background-color: #ffffff;
                padding: 0;
                color: #000000;
            }

            .dashboard-container {
                box-shadow: none;
                padding: 0;
                max-width: 100%;
            }

            /* 印刷時に不要なコントローラーやチェックボックスを非表示 */
            header, .control-panel, .col-check, input[type="checkbox"] {
                display: none !important;
            }

            .table-wrapper {
                border: none;
                overflow: visible;
            }

            table {
                width: 100%;
                min-width: 100%;
                font-size: 0.75rem; /* A4横に収まりやすくするため文字を縮小 */
            }

            th, td {
                padding: 6px 8px;
                border: 1px solid #cbd5e1 !important; /* しっかり枠線を出す */
            }

            th {
                background-color: #f1f5f9 !important;
                color: #000000 !important;
            }

            th.sortable::after {
                display: none; /* ソートアイコンを非表示 */
            }

            tr {
                background-color: #ffffff !important;
                page-break-inside: avoid;
            }

            .badge {
                padding: 0;
                background-color: transparent !important;
                color: #000000 !important;
                font-weight: bold;
            }
            
            /* 備考欄の全表示 */
            .col-remarks {
                max-width: none;
                white-space: normal;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1>📋 アルコールチェック運行管理データ一覧</h1>
    </header>

    <div class="control-panel">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="運転者、車両No、日付などで検索...">
        </div>

        <div class="action-buttons">
            <span class="selection-status">選択中: <span id="selectedCount">0</span> 件</span>
            <button class="btn btn-print" onclick="triggerPrint()">🖨️ 画面印刷</button>
            <button class="btn btn-pdf" onclick="triggerPrint()">📄 PDFとして保存</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr>
                    <th class="col-check"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
                    <th class="sortable" id="th-name" onclick="sortTable('name')">① 運転者氏名</th>
                    <th class="sortable" id="th-car" onclick="sortTable('car')">② 車両ナンバー</th>
                    <th>③ 測定日</th>
                    <th>④ 測定時間</th>
                    <th>⑤ 状況</th>
                    <th>⑥ 測定結果</th>
                    <th class="col-center">⑦ 酒気帯び</th>
                    <th class="col-center">⑧ 健康</th>
                    <th class="col-center">⑨ 点検</th>
                    <th>⑩ 確認方法・詳細</th>
                    <th>⑪ 走行距離</th>
                    <th>⑫ 備考欄</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // ➔ URLをしっかり「"」で囲むように修正しました
    const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRgvEH3pS22xlOhK01uCnoMg9s9_qkcyUMcJ8fww1QiFfAhRnGMBy41F8db-SR9C2zQTAD_Y_e5W5wN/pub?output=csv";

    // 画面が開いた瞬間に自動でスプレッドシートのデータを読み込む
    window.onload = function() {
        loadSheetData();
    };

    // 1. 検索機能 (簡易リアルタイムフィルタリング)
    function filterTable() {
        const input = document.getElementById("searchInput");
        const filter = input.value.toLowerCase();
        const table = document.getElementById("dataTable");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let rowText = tr[i].textContent.toLowerCase();
            if (rowText.includes(filter)) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }

    // 2. 並び替え（ソート）機能 (運転者氏名 / 車両ナンバー)
    let currentSort = { column: null, direction: 'asc' };

    function sortTable(type) {
        const table = document.getElementById("dataTable");
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));
        
        const colIndex = (type === 'name') ? 1 : 2;
        
        if (currentSort.column === type) {
            currentSort.direction = (currentSort.direction === 'asc') ? 'desc' : 'asc';
        } else {
            currentSort.column = type;
            currentSort.direction = 'asc';
        }

        updateSortHeaders(type, currentSort.direction);

        const directionModifier = (currentSort.direction === 'asc') ? 1 : -1;

        rows.sort((rowA, rowB) => {
            if (type === 'name') {
                const cellA = rowA.cells[colIndex].getAttribute('data-kana') || "";
                const cellB = rowB.cells[colIndex].getAttribute('data-kana') || "";
                return cellA.localeCompare(cellB, 'ja') * directionModifier;
            } else {
                const cellA = rowA.cells[colIndex].textContent.trim();
                const cellB = rowB.cells[colIndex].textContent.trim();
                return (parseInt(cellA, 10) - parseInt(cellB, 10)) * directionModifier;
            }
        });

        rows.forEach(row => tbody.appendChild(row));
    }

    function updateSortHeaders(activeType, direction) {
        const thName = document.getElementById("th-name");
        const thCar = document.getElementById("th-car");

        thName.className = "sortable";
        thCar.className = "sortable";

        if (activeType === 'name') {
            thName.classList.add(direction === 'asc' ? 'sort-asc' : 'sort-desc');
        } else if (activeType === 'car') {
            thCar.classList.add(direction === 'asc' ? 'sort-asc' : 'sort-desc');
        }
    }

    // 3. 選択機能 (全選択・個別選択・行ハイライト)
    function toggleSelectAll(masterCheckbox) {
        const checkboxes = document.querySelectorAll(".row-check");
        checkboxes.forEach(cb => {
            const row = cb.closest("tr");
            if (row.style.display !== "none") {
                cb.checked = masterCheckbox.checked;
                updateRowStyle(cb);
            }
        });
        updateSelectedCount();
    }

    function updateRowStyle(checkbox) {
        const row = checkbox.closest("tr");
        if (checkbox.checked) {
            row.classList.add("selected-row");
        } else {
            row.classList.remove("selected-row");
        }
    }

    function updateSelectedCount() {
        const checkedCount = document.querySelectorAll(".row-check:checked").length;
        document.getElementById("selectedCount").textContent = checkedCount;
    }

    // 4. 印刷 & PDF化機能
    function triggerPrint() {
        window.print();
    }

    // 5. スプレッドシートからデータを取得してテーブルを生成する関数
    function loadSheetData() {
        fetch(SPREADSHEET_CSV_URL)
            .then(response => response.text())
            .then(csvText => {
                const tbody = document.querySelector("#dataTable tbody");
                tbody.innerHTML = ""; // 初期表示のダミーをクリア

                const lines = csvText.split("\n");
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue; // 空白行はスキップ

                    // Windows等の改行コード(\r)のゴミを消去してからカンマで区切る処理に改良
                    const cells = line.replace(/\r$/, "").split(",");
                    
                    const name       = cells[0]  || "";
                    const kana       = cells[1]  || "";
                    const car        = cells[2]  || "";
                    const date       = cells[3]  || "";
                    const time       = cells[4]  || "";
                    const status     = cells[5]  || "";
                    const result     = cells[6]  || "";
                    const alcohol    = cells[7]  || "";
                    const health     = cells[8]  || "";
                    const inspection = cells[9]  || "";
                    const method     = cells[10] || "";
                    const distance   = cells[11] || "";
                    const remarks    = cells[12] || "";

                    let badgeClass = "badge-safe";
                    if (alcohol.includes("有り")) badgeClass = "badge-danger";
                    if (alcohol.includes("注意")) badgeClass = "badge-warn";

                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td class="col-check"><input type="checkbox" class="row-check" onchange="updateRowStyle(this); updateSelectedCount();"></td>
                        <td data-kana="${kana}">${name}</td>
                        <td>${car}</td>
                        <td>${date}</td>
                        <td>${time}</td>
                        <td>${status}</td>
                        <td>${result}</td>
                        <td class="col-center"><span class="badge ${badgeClass}">${alcohol}</span></td>
                        <td class="col-center">${health}</td>
                        <td class="col-center">${inspection}</td>
                        <td>${method}</td>
                        <td>${distance}</td>
                        <td class="col-remarks">${remarks}</td>
                    `;
                    tbody.appendChild(tr);
                }
            })
            .catch(error => {
                console.error("データの読み込みに失敗しました:", error);
            });
    }
</script>

</body>
</html>
